<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CBS donor discovery – Interactive Demo</title>
    <style>
      :root{
        --bg: #ffffff;
        --text: #0b0f19;
        --muted: #6b7280;
        --border: rgba(0,0,0,.10);
        --panel: #ffffff;
        --chip: rgba(0,0,0,.04);
        --shadow: 0 14px 40px rgba(0,0,0,.10);
        --radius: 14px;

        /* Optional: use your screenshot as background for the empty screen.
           Put it next to this HTML and name it "chatgpt-empty.png", then uncomment
           the background-image lines under body. */
        --bgImage: url("chatgpt-empty.png");
      }
      *{ box-sizing: border-box; }
      body{
        margin:0;
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color: var(--text);
        background: var(--bg);
        /* background-image: var(--bgImage);
        background-size: cover;
        background-position: center top; */
      }

      /* Top nav (approx.) */
      .nav{
        height: 56px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding: 0 18px;
      }
      .nav-left{
        display:flex;
        align-items:center;
        gap:10px;
        color:#111827;
        font-weight:600;
      }
      .nav-dot{
        width:28px;height:28px;border-radius:8px;
        background: #111827;
        position:relative;
      }
      .nav-dot:after{
        content:"";
        position:absolute; inset:8px;
        border-radius:5px;
        background:#fff;
        opacity:.12;
      }
      .nav-right{
        display:flex;
        align-items:center;
        gap:10px;
      }
      .btn{
        border:1px solid var(--border);
        background:#fff;
        border-radius:999px;
        padding: 8px 12px;
        font-weight:600;
      }
      .btn.primary{
        background:#111827;
        color:#fff;
        border-color:#111827;
      }

      /* Empty landing screen */
      .landing{
        min-height: calc(100vh - 56px);
        display:flex;
        align-items:center;
        justify-content:center;
        padding: 24px;
      }
      .landing-inner{
        width: min(980px, 100%);
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap: 18px;
        margin-top: -40px;
      }
      .headline{
        font-size: 28px;
        font-weight: 500;
        letter-spacing: .2px;
      }

      /* Composer shell */
      .composer{
        width: min(680px, 100%);
        border:1px solid var(--border);
        border-radius: 999px;
        padding: 10px 12px;
        display:flex;
        align-items:center;
        gap: 10px;
        box-shadow: 0 1px 0 rgba(0,0,0,.03);
        background: rgba(255,255,255,.92);
      }
      .composer .add{
        border:1px solid var(--border);
        background:#fff;
        border-radius:999px;
        padding: 6px 10px;
        font-weight:600;
        color:#111827;
        user-select:none;
      }
      .composer .voice{
        border:1px solid var(--border);
        background:#fff;
        border-radius:999px;
        padding: 6px 10px;
        font-weight:600;
        user-select:none;
      }

      /* Real input */
      .inputField{
        flex:1;
        border:0;
        outline:none;
        font: inherit;
        color:#111827;
        background: transparent;
        padding: 6px 4px;
      }
      .inputField::placeholder{ color: #9ca3af; }

      /* Conversation view */
      .chatView{
        display:none;
        min-height: calc(100vh - 56px);
      }
      .thread{
        width: min(860px, 100%);
        margin: 0 auto;
        padding: 18px 16px 80px;
      }
      .msg{
        display:flex;
        gap: 12px;
        margin: 14px 0;
      }
      .avatar{
        width: 34px; height: 34px;
        border-radius: 10px;
        background: rgba(0,0,0,.06);
        display:flex;align-items:center;justify-content:center;
        font-weight: 800;
        color:#111827;
        flex: 0 0 34px;
        user-select:none;
      }
      .bubble{
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: var(--radius);
        padding: 12px 12px;
        box-shadow: 0 4px 14px rgba(0,0,0,.05);
        width:100%;
      }
      .label{
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .mono{
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 13px;
        white-space: pre-wrap;
      }
      .rendered{ white-space: normal; }
      .rendered h3{ margin: 10px 0 6px; font-size: 14px; }
      .rendered ul{ margin: 6px 0 0 18px; }
      .rendered li{ margin: 4px 0; }
      .rendered a{ color:#2563eb; text-decoration:none; }
      .rendered a:hover{ text-decoration:underline; }

      /* Bottom dock composer in chat view */
      .dock{
        position: fixed;
        left:0; right:0;
        bottom: 12px;
        display:flex;
        justify-content:center;
        padding: 0 16px;
      }
      .dock .composer{
        width: min(860px, 100%);
        box-shadow: var(--shadow);
      }

      /* Thinking dots */
      .dots{
        display:inline-flex;
        gap:6px;
        align-items:center;
        padding: 2px 0;
      }
      .dots span{
        width:6px; height:6px;
        border-radius:999px;
        background: rgba(17,24,39,.55);
        display:inline-block;
        animation: bounce 1s infinite;
      }
      .dots span:nth-child(2){ animation-delay: .15s; }
      .dots span:nth-child(3){ animation-delay: .30s; }
      @keyframes bounce{
        0%, 80%, 100% { transform: translateY(0); opacity: .55; }
        40% { transform: translateY(-4px); opacity: 1; }
      }

      .demoHint{
        width:min(860px,100%);
        margin: 0 auto;
        padding: 0 16px 10px;
        color: var(--muted);
        font-size: 12px;
        display:flex;
        justify-content:flex-end;
      }
      .pill{
        display:inline-flex;
        gap:8px;
        align-items:center;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--chip);
      }
      .pill b{ color:#111827; }

      .kbd{
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 11px;
        border: 1px solid var(--border);
        background: #fff;
        padding: 2px 6px;
        border-radius: 8px;
        color:#111827;
      }
    </style>
  </head>

  <body>
    <div class="nav">
      <div class="nav-left">
        <div class="nav-dot" aria-hidden="true"></div>
        <div>ChatGPT</div>
      </div>
      <div class="nav-right">
        <button class="btn primary" type="button">Log in</button>
        <button class="btn" type="button">Sign up for free</button>
      </div>
    </div>

    <!-- EMPTY SCREEN -->
    <main class="landing" id="landing">
      <div class="landing-inner">
        <div class="headline">What can I help with?</div>

        <div class="composer" aria-label="Message composer (demo)">
          <div class="add">+ Add</div>
          <input
            id="landingInput"
            class="inputField"
            type="text"
            placeholder="Ask anything"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="voice">Voice</div>
        </div>

        <div class="demoHint">
          <span class="pill"><b>Demo</b> • Press <span class="kbd">Enter</span> to send Emily's prompt</span>
        </div>
      </div>
    </main>

    <!-- CHAT VIEW -->
    <main class="chatView" id="chatView">
      <div class="thread" id="thread"></div>

      <div class="dock">
        <div class="composer" aria-label="Message composer (demo)">
          <div class="add">+ Add</div>
          <input
            id="dockInput"
            class="inputField"
            type="text"
            placeholder="Message ChatGPT…"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="voice">Voice</div>
        </div>
      </div>

      <div class="demoHint" style="position:fixed;right:0;left:0;bottom:64px;">
        <div style="width:min(860px,100%);margin:0 auto;padding:0 16px;display:flex;justify-content:flex-end;">
          <span class="pill"><b>Tip</b> • You can type follow-ups in the bottom bar and press <span class="kbd">Enter</span></span>
        </div>
      </div>
    </main>

    <script>
      // ====== TUNABLE SETTINGS ======
      const THINKING_MS = 1100;     // how long GPT "thinks"
      const STREAM_SPEED_MS = 8;   // streaming speed (characters)

      const landing = document.getElementById("landing");
      const chatView = document.getElementById("chatView");
      const landingInput = document.getElementById("landingInput");
      const dockInput = document.getElementById("dockInput");
      const thread = document.getElementById("thread");

      function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
      function scrollToBottom(){ window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }); }

      function renderThinkingDots(){
        return `<span class="dots" aria-label="thinking"><span></span><span></span><span></span></span>`;
      }

      function addMessage({who, label, contentHtml, isMono=false}){
        const msg = document.createElement("div");
        msg.className = `msg ${who}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = who === "user" ? "S" : "G";

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        const lab = document.createElement("div");
        lab.className = "label";
        lab.textContent = label;

        const body = document.createElement("div");
        body.className = isMono ? "mono" : "rendered";
        body.innerHTML = contentHtml;

        bubble.appendChild(lab);
        bubble.appendChild(body);

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        thread.appendChild(msg);

        scrollToBottom();
        return { body };
      }

      async function streamTextInto(el, text, speedMs){
        el.textContent = "";
        for (let i=0;i<text.length;i++){
          el.textContent += text[i];
          if (i % 40 === 0) scrollToBottom();
          await sleep(speedMs);
        }
        scrollToBottom();
      }

      // ====== CONTENT: same response, regardless of prompt for demo ======
      const assistantStreamText =
`Yes — there are a few meaningful things you can do today to help the healthcare system, even if you are not a clinician.

HERE ARE SOME HIGH-IMPACT OPTIONS
• Donate blood — one of the most immediate ways to help patients in surgery, cancer treatment, trauma care, and ongoing hospital care
• Register as an organ and tissue donor if you have not already
• Support a caregiver or patient family with meals, rides, or time
• Volunteer or raise awareness for healthcare-related causes in your community

A GOOD PLACE TO START TODAY
If you want to do something practical and immediate, donating blood is one of the clearest ways to make a direct impact. Hospitals rely on a steady supply every day, and shortages can put additional pressure on an already strained system.

IF YOU ARE IN CANADA
You can learn how blood donation works, check whether you may be eligible, and book an appointment with Canadian Blood Services.

• Learn how donation works: https://canadian-blood-services.vercel.app/About-Us/Newsroom/am-i-eligible-donate-blood
• Find donor information: https://canadian-blood-services.vercel.app/
• Book an appointment: https://canadian-blood-services.vercel.app/portal/login?utm_source=chatgpt&utm_medium=referral&utm_campaign=make_an_impact

WHAT TO EXPECT
• The process is designed to be straightforward for first-time donors
• You will be guided through eligibility, location, and appointment options
• Even one appointment can help save or improve multiple lives

If you want, I can also help you decide whether blood donation, volunteering, or organ donor registration is the best fit for your situation today.`;

      const assistantFinalHtml = `
        <div class="rendered">
          <p><b>Yes — there are meaningful things you can do today to help the healthcare system.</b> Even if you are not a clinician, there are still practical ways to make a direct impact.</p>

          <h3>High-impact options</h3>
          <ul>
            <li><b>Donate blood</b> — one of the most immediate ways to support patients in surgery, trauma care, cancer treatment, and everyday hospital needs.</li>
            <li><b>Register as an organ and tissue donor</b> if you have not already.</li>
            <li><b>Support caregivers or patient families</b> with meals, transportation, or time.</li>
            <li><b>Volunteer or raise awareness</b> for healthcare-related causes in your community.</li>
          </ul>

          <h3>A practical place to start today</h3>
          <p>If you want to do something immediate and tangible, <b>donating blood</b> is one of the clearest ways to help. Hospitals depend on a steady supply every day, and shortages can place added pressure on an already strained healthcare system.</p>

          <h3>If you are in Canada</h3>
          <p>You can learn how blood donation works, understand what to expect as a first-time donor, and book an appointment with <b>Canadian Blood Services</b>.</p>
          <ul>
            <li><a href="https://canadian-blood-services.vercel.app/About-Us/Newsroom/am-i-eligible-donate-blood?utm_source=chatgpt&utm_medium=referral&utm_campaign=make_an_impact" target="_blank" rel="noreferrer">Interested in blood donation? This is how it works</a></li>
            <li><a href="https://canadian-blood-services.vercel.app/?utm_source=chatgpt&utm_medium=referral&utm_campaign=make_an_impact" target="_blank" rel="noreferrer">Visit Canadian Blood Services</a></li>
            <li><a href="https://canadian-blood-services.vercel.app/portal/login?utm_source=chatgpt&utm_medium=referral&utm_campaign=make_an_impact" target="_blank" rel="noreferrer">Book an appointment</a></li>
          </ul>

          <h3>What to expect</h3>
          <ul>
            <li>The process is designed to be straightforward for first-time donors.</li>
            <li>You will be guided through eligibility, location, and appointment options.</li>
            <li>Even one appointment can make a meaningful difference for patients who rely on donated blood.</li>
          </ul>

          <p style="margin-top:10px;"><b>Next step:</b> Start with <a href="https://canadian-blood-services.vercel.app//About-Us/Newsroom/am-i-eligible-donate-blood?utm_source=chatgpt&utm_medium=referral&utm_campaign=make_an_impact" target="_blank" rel="noreferrer">how donation works</a>, then continue into account creation and appointment booking.</p>

        </div>
      `;

      let isBusy = false;

      async function respond(){
        if (isBusy) return;
        isBusy = true;

        // GPT thinking message
        const thinking = addMessage({
          who: "assistant",
          label: "ChatGPT",
          contentHtml: renderThinkingDots(),
          isMono: false
        });

        await sleep(THINKING_MS);

        // Stream response as text
        thinking.body.className = "mono";
        await streamTextInto(thinking.body, assistantStreamText, STREAM_SPEED_MS);

        // Replace with formatted HTML
        await sleep(250);
        thinking.body.className = "rendered";
        thinking.body.innerHTML = assistantFinalHtml;

        isBusy = false;
      }

      function sendUserMessage(fromEl){
        const text = (fromEl.value || "").trim();
        if (!text) return;

        // First send transitions from landing -> chat
        const isFirst = (chatView.style.display === "none" || chatView.style.display === "");
        if (isFirst){
          landing.style.display = "none";
          chatView.style.display = "block";
        }

        addMessage({
          who: "user",
          label: "Emily (caregiver)",
          contentHtml: text,
          isMono: false
        });

        fromEl.value = "";
        // Keep focus in the chat dock after first send
        dockInput.focus();

        // Then GPT responds
        respond();
      }

      // Enter-to-send: landing input
      landingInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter"){
          e.preventDefault();
          sendUserMessage(landingInput);
        }
      });

      // Enter-to-send: dock input
      dockInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter"){
          e.preventDefault();
          sendUserMessage(dockInput);
        }
      });

      // Autofocus landing input for live demo
      window.addEventListener("load", () => {
        landingInput.focus();
        // Optional: prefill Sarah’s prompt so you can just hit Enter.
        landingInput.value = "Is there anything meaningful I can do today to help out the healthcare system?";
      });
    </script>
  </body>
</html>
